# docker-compose.yml — knowledge-navigator
#
# Spins up ChromaDB for local development.
# Run tests locally: pytest tests/ -v
# Start ChromaDB: docker-compose up chromadb

services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false

  ui:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - chromadb
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    command: ["streamlit", "run", "src/ui/app.py", "--server.port=8501"]
    # NOTE: Dockerfile added Phase 1 Wk 7 when Streamlit UI is built

volumes:
  chroma_data:
